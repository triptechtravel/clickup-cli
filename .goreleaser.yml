version: 2

project_name: clickup

before:
  hooks:
    - go install github.com/oapi-codegen/oapi-codegen-exp/experimental/cmd/oapi-codegen@latest
    - go mod tidy
    - make api-gen

builds:
  - main: ./cmd/clickup
    binary: clickup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/triptechtravel/clickup-cli/internal/build.Version={{.Version}}
      - -X github.com/triptechtravel/clickup-cli/internal/build.Commit={{.Commit}}
      - -X github.com/triptechtravel/clickup-cli/internal/build.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: triptechtravel
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    skip_upload: false
    homepage: "https://github.com/triptechtravel/clickup-cli"
    description: "CLI tool for ClickUp task management with GitHub integration"
    license: "MIT"
    install: |
      bin.install "clickup"
    test: |
      system "#{bin}/clickup", "version"
    # The "clickup" cask (desktop app) shadows this formula under the bare
    # name `clickup`. Declare the conflict so Homebrew prints a clearer
    # message than the generic "Cask clickup is not installed" warning.
    custom_block: |
      conflicts_with cask: "clickup",
        because: "the ClickUp desktop app cask also installs a binary; use `brew install triptechtravel/tap/clickup` explicitly"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  mode: keep-existing
  github:
    owner: triptechtravel
    name: clickup-cli
