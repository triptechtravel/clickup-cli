name: Smoke

# Manually-triggered round-trip against a real ClickUp workspace. Catches
# spec-drift bugs (response shape mismatches, encoding regressions) that
# unit tests can't see — e.g. the v0.34.0 → v0.34.1 issue where the
# create-comment response started failing to decode.
#
# Requires a `CLICKUP_SMOKE_TOKEN` repo secret. The token's workspace will
# briefly host a `[Smoke Test]`-prefixed task and a comment; both are
# deleted before the run finishes.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref / tag to smoke (default: main)"
        required: false
        default: main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build CLI
        run: make build
      - name: Run smoke
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_SMOKE_TOKEN }}
        run: |
          if [ -z "${CLICKUP_TOKEN:-}" ]; then
            echo "::warning::CLICKUP_SMOKE_TOKEN not set — skipping smoke"
            exit 0
          fi
          ./bin/clickup auth login --with-token <<< "$CLICKUP_TOKEN"
          BIN=./bin/clickup ./scripts/smoke.sh
