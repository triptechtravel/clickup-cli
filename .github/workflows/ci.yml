name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen-exp/experimental/cmd/oapi-codegen@latest
      - name: Generate API clients
        run: make api-gen
      - run: go test ./...
      - run: go vet ./...
      - name: Check docs are up to date
        run: |
          make docs
          git diff --exit-code docs/ || { echo "::error::Docs are out of date. Run 'make docs' locally and commit the result."; exit 1; }

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen-exp/experimental/cmd/oapi-codegen@latest
      - name: Generate API clients
        run: make api-gen
      - run: go build -o /dev/null ./cmd/clickup
